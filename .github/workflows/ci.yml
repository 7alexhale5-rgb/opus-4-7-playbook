name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sanitization
        run: bash tests/test_sanitization.sh

      - name: Code examples (syntax check)
        run: bash tests/test_code_examples.sh

      - name: Link check
        run: python3 tests/test_links.py
